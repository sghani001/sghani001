name: Update Profile Trophies

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  update-trophies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Clean up any accidental directory conflicts before running
      - name: Clear Conflicting Paths
        run: |
          if [ -d "trophy.svg" ]; then
            echo "Removing conflicting trophy.svg directory..."
            rm -rf trophy.svg
          fi

      - name: Generate Trophies
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: sghani001
          token: ${{ secrets.GITHUB_TOKEN }}
          output_path: trophy.svg
          theme: nord

      - name: Commit and Push SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force remove directory from git tracking if it was accidentally committed
          if git ls-files --stage trophy.svg | grep -q "160000\|040000"; then
            git rm -r --cached trophy.svg
          fi

          git add trophy.svg
          git diff-index --quiet HEAD || git commit -m "chore: update profile trophies"
          git push
