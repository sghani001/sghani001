name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: Platane/snk@v3
        with:
          github_user_name: sghani001
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#1de9b6
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#1de9b6
          grid_padding: 5
          grid_margin: 5

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
